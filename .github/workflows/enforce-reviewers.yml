name: Enforce Reviewers

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - 'staging'
      - 'main'
      - 'release/**'

permissions:
  pull-requests: read

jobs:
  enforce-reviewers:
    uses: EngineerincioOrg/Infra_CI_Templates/.github/workflows/reusable-enforce-reviewers.yml@main
    secrets:
        GH_TOKEN: ${{ secrets.ORG_GH_TOKEN }}
    with:
      pr_url: ${{ github.event.pull_request.html_url }}
      head_ref: ${{ github.head_ref }}
      base_ref: ${{ github.base_ref }}