name: Deploy Website to AWS Amplify

on:
  push:
    branches:
      - staging
      - release/**
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: read
  actions: read
  security-events: write
  id-token: write

jobs:
  setup-env-variables:
    name: Get Environment Variables
    runs-on: ubuntu-latest

    env:
      STAGING_ENV_PACK: ${{ vars.STAGING_ENV_PACK }}

    steps:
      - name: 📌 Set Environment Variables
        shell: bash
        run: |
          ENV_PACK=""

          # branch + staging
          if [ "$GITHUB_REF_TYPE" = "branch" ] && [ "$GITHUB_REF_NAME" = "staging" ]; then
            ENV_PACK="${STAGING_ENV_PACK}"
          fi

          # tags -> production
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            ENV_PACK="${PRODUCTION_ENV_PACK}"
          fi

          # 1) Clean pack: remove blank lines + Windows \r
          CLEAN_PACK=$(printf '%s\n' "$ENV_PACK" | sed '/^\s*$/d' | tr -d '\r')

          # 2) Print each env (for debug) – *safe*, no secrets here
          while IFS='=' read -r key value; do
            [ -z "$key" ] && continue
            echo "➡️ [Environment variable] $key: $value"
          done <<< "$CLEAN_PACK"

          # 3) Build a single-line comma-separated ENV_STRING
          ENV_STRING=$(printf '%s\n' "$CLEAN_PACK" | paste -sd, -)

          echo "Final ENV_STRING (for debug, single line):"
          echo "$ENV_STRING"

          echo "ENV_STRING=$ENV_STRING" >> "$GITHUB_ENV"

