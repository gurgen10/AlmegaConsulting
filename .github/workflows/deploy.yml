name: Deploy Website to AWS Amplify

on:
  push:
    branches:
      - staging
      - release/**
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: read
  actions: read
  security-events: write
  id-token: write

jobs:
  setup-env-variables:
    name: Get Environment Variables
    runs-on: ubuntu-latest

    env:
      STAGING_ENV_PACK: ${{ vars.STAGING_ENV_PACK }}

    steps:
      - name: 📌 Set Environment Variables
        shell: bash
        run: |
          ENV_PACK=""

          # branch + staging
          if [ "$GITHUB_REF_TYPE" = "branch" ] && [ "$GITHUB_REF_NAME" = "staging" ]; then
            ENV_PACK="${STAGING_ENV_PACK}"
          fi

          # tags -> production
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            ENV_PACK="${PRODUCTION_ENV_PACK}"
          fi

          # Remove empty lines just in case
          CLEAN_PACK=$(echo "$ENV_PACK" | sed '/^\s*$/d')

          # Export each KEY=VALUE line, and build clean ENV_STRING
          while IFS='=' read -r key value; do
            [ -z "$key" ] && continue

            echo "➡️ [Environment variable] $key: $value"

            # Build comma-separated string without leading comma
            if [ -z "$ENV_STRING" ]; then
              ENV_STRING="$key=$value"
            else
              ENV_STRING="$ENV_STRING,$key=$value"
            fi
          done <<< "$CLEAN_PACK"

          echo "Final ENV_STRING (for debug):"
          echo "$ENV_STRING"

          # Available for later steps in THIS job
          echo "ENV_STRING=$ENV_STRING" >> "$GITHUB_ENV"

