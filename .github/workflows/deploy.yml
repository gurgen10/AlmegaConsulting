name: Deploy Website to AWS Amplify

on:
  push:
    branches:
      - staging
      - release/**
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: read
  actions: read
  security-events: write
  id-token: write

jobs:
  setup-env-variables:
    name: Get Environment Variables
    runs-on: ubuntu-latest

    env:
      STAGING_ENV_PACK: ${{ vars.STAGING_ENV_PACK }}

    steps:
      - name: 📌 Set Environment Variables
        shell: bash
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          ENV_PACK=""

          if [ "$BRANCH" = "staging" ]; then
            ENV_PACK="$STAGING_ENV_PACK"
          fi

          echo "Loaded ENV_PACK:"
          echo "$ENV_PACK"

          while IFS='=' read -r key value; do
            [ -z "$key" ] && continue
            echo "$key=$value"
            echo "$key=$value" >> "$GITHUB_ENV"
          done <<< "$ENV_PACK"

          # 2) Also build comma-separated string for Amplify
          ENV_STRING=$(echo "$ENV_PACK" | tr '\n' ',' | sed 's/,$//')
          echo "ENV_STRING=$ENV_STRING" >> "$GITHUB_ENV"
