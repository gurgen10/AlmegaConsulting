name: Deploy Website to AWS Amplify

on:
  push:
    branches:
      - staging
      - release/**
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: read
  actions: read
  security-events: write
  id-token: write

jobs:
  setup-env-variables:
    name: Get Environment Variables
    runs-on: ubuntu-latest

    steps:
      - name: 📌 Set Environment Variables
        shell: bash
        run: |
          env

          case "$GITHUB_REF_NAME" in
            staging)
              ENV_STRING=""
              while IFS='=' read -r key value; do
                if [[ "$key" != STAGING_* ]]; then
                  countinue
                fi

                echo "📍 Found: $key=$value"

                if [ -z "$ENV_STRING" ]; then
                  ENV_STRING="${key#STAGING_}=$value"
                else
                  ENV_STRING="$ENV_STRING,${key#STAGING_}=$value"
                fi
              done < <(env)
            ;;
          esac
